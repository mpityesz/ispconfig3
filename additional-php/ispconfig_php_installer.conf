#!/bin/bash
# ISPConfig PHP Version Installer - Configuration File
# =====================================================
# This file contains all configuration options for the ispconfig_php_installer.sh script
# Copy this file and modify it according to your needs

# =============================================================================
# SURY REPOSITORY SETTINGS
# =============================================================================

# Install SURY repository
# Set to "yes" to add the SURY PHP repository (required for older/newer PHP versions)
INSTALL_SURY_REPO="yes"

# =============================================================================
# PHP VERSIONS TO INSTALL
# =============================================================================
# Set each version to "yes" to install, "no" to skip
# The script will automatically detect which versions are already installed

# Legacy versions (not recommended unless specifically needed)
INSTALL_PHP_56="no"
INSTALL_PHP_70="no"
INSTALL_PHP_71="no"

# Supported versions
INSTALL_PHP_72="no"
INSTALL_PHP_73="no"
INSTALL_PHP_74="yes"
INSTALL_PHP_80="yes"
INSTALL_PHP_81="yes"
INSTALL_PHP_82="yes"
INSTALL_PHP_83="yes"
INSTALL_PHP_84="yes"

# =============================================================================
# PHP EXTENSIONS
# =============================================================================
# These extensions will be installed for each PHP version (if available)

# Optional extensions
INSTALL_IMAGICK="yes"
INSTALL_MEMCACHE="yes"
INSTALL_MEMCACHED="yes"
INSTALL_APCU="yes"

# Legacy extensions (only for older PHP versions)
INSTALL_RECODE="yes"      # Available only for PHP <= 7.3
INSTALL_MCRYPT="yes"      # Available only for PHP <= 7.1 (native), 7.2+ via PECL
INSTALL_APCU_BC="yes"     # Available only for PHP < 8.0

# =============================================================================
# PHP.INI SETTINGS
# =============================================================================
# Configure php.ini settings for all installed versions

# Apply custom php.ini settings
CONFIGURE_PHP_INI="yes"

# Timezone setting
PHP_TIMEZONE="Europe/Budapest"

# CGI fix_pathinfo (recommended: 0 for security)
PHP_CGI_FIX_PATHINFO="0"

# Memory limit
PHP_MEMORY_LIMIT="128M"

# Upload max filesize
PHP_UPLOAD_MAX_FILESIZE="30M"

# Post max size
PHP_POST_MAX_SIZE="32M"

# Max execution time (seconds)
PHP_MAX_EXECUTION_TIME="120"

# Max input time (seconds)
PHP_MAX_INPUT_TIME="120"

# =============================================================================
# PHP-FPM SETTINGS
# =============================================================================

# Enable PHP-FPM services (systemctl enable)
# Set to "yes" to enable services to start automatically on boot
# Set to "no" if you want to enable them manually later
ENABLE_FPM_SERVICES="yes"

# Start PHP-FPM services immediately after installation
# Set to "no" if you want to start them manually later
START_FPM_SERVICES="no"

# =============================================================================
# ISPCONFIG INTEGRATION
# =============================================================================

# Add PHP versions to ISPConfig database
# Set to "yes" to automatically add installed PHP versions to ISPConfig
# Set to "no" to add them manually through the web interface
AUTO_ADD_TO_ISPCONFIG="no"

# ISPConfig database credentials
# Only required if AUTO_ADD_TO_ISPCONFIG="yes"
ISPCONFIG_DB_HOST="localhost"
ISPCONFIG_DB_NAME="dbispconfig"
ISPCONFIG_DB_USER="root"
ISPCONFIG_DB_PASS=""

# Server ID in ISPConfig
# Usually "1" for single server, check your setup for multi-server
ISPCONFIG_SERVER_ID="1"

# =============================================================================
# LOGGING AND DIRECTORIES
# =============================================================================

# Log directory
LOG_DIR="/var/log/php"

# Configuration backup directory
BACKUP_DIR="/root/install-configs/php"

# Create log directory if it doesn't exist
CREATE_LOG_DIR="yes"

# Create backup directory if it doesn't exist
CREATE_BACKUP_DIR="yes"

# Log file for this installation
INSTALL_LOG="/var/log/ispconfig_php_installer.log"

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================

# Clean up package cache after installation
CLEANUP_AFTER_INSTALL="yes"

# Configure system default PHP version using update-alternatives
# Set to "yes" to automatically set the recommended PHP version as default
# Set to "no" to skip this step
CONFIGURE_UPDATE_ALTERNATIVES="yes"

# Verify that configured extensions are loaded after installation
# Set to "yes" to check if optional extensions are working
# Set to "no" to skip verification
VERIFY_EXTENSIONS="yes"
